name: Release Extension

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build extension
        run: npm run build
        
      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Install ovsx
        run: npm install -g ovsx

      - name: Package extension
        run: npm run package
        
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          # Create changelog anchor (remove dots for GitHub markdown)
          CHANGELOG_ANCHOR=$(echo "$VERSION" | tr -d '.')
          echo "CHANGELOG_ANCHOR=$CHANGELOG_ANCHOR" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Changes in v${{ steps.get_version.outputs.VERSION }}

            See the full changelog: [CHANGELOG.md](https://github.com/kykurniawan/vscode-dbml-previewer/blob/main/CHANGELOG.md#${{ steps.get_version.outputs.CHANGELOG_ANCHOR }})

            ### Installation

            Install from [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=rizkykurniawan.dbml-previewer) or [Open VSX Registry](https://open-vsx.org/extension/rizkykurniawan/dbml-previewer)

            Or download the `.vsix` file below and install manually:
            ```bash
            code --install-extension rizkykurniawan.dbml-previewer-${{ steps.get_version.outputs.VERSION }}.vsix
            ```
          draft: false
          prerelease: false
          
      - name: Upload VSIX to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dbml-previewer-${{ steps.get_version.outputs.VERSION }}.vsix
          asset_name: rizkykurniawan.dbml-previewer-${{ steps.get_version.outputs.VERSION }}.vsix
          asset_content_type: application/zip
          
      - name: Publish to VS Code Marketplace
        id: publish_vscode
        continue-on-error: true
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm run publish

      - name: Publish to Open VSX Registry
        id: publish_ovsx
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npm run publish:ovsx

      - name: Report publishing summary
        if: always()
        run: |
          echo "### Publishing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.publish_vscode.outcome }}" == "success" ]; then
            echo "✅ **VS Code Marketplace**: Published successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **VS Code Marketplace**: Failed to publish" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.publish_ovsx.outcome }}" == "success" ]; then
            echo "✅ **Open VSX Registry**: Published successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Open VSX Registry**: Failed to publish" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.publish_vscode.outcome }}" == "failure" ] && [ "${{ steps.publish_ovsx.outcome }}" == "failure" ]; then
            echo "🚨 Failed to publish to both marketplaces" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi